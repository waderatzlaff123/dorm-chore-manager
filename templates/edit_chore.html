{% extends "base.html" %}

{% block title %}Edit Chore{% endblock %}

{% block content %}
    <h2>Edit Chore</h2>
    <form method="post" class="chore-form">
        <label for="title">Title</label>
        <input type="text" id="title" name="title" value="{{ chore.title }}" required>

        <label for="description">Description</label>
        <textarea id="description" name="description" rows="4">{{ chore.description }}</textarea>

        <label for="due_date">Due Date</label>
        <input type="date" id="due_date" name="due_date" value="{{ chore.due_date }}" required>

        <label for="due_time">Due Time (optional)</label>
        <input type="time" id="due_time" name="due_time" value="{{ chore.due_time }}">

        <label for="resident_ids">Assign Residents</label>
        <select id="resident_ids" name="resident_ids" multiple size="5" required>
            <option value="all">All Residents</option>
            {% for resident in residents %}
                <option value="{{ resident.id }}" {% if resident.id in chore.resident_ids %}selected{% endif %}>
                    {{ resident.name }}
                </option>
            {% endfor %}
        </select>
        <p class="field-note">Hold Ctrl (Cmd on Mac) to choose multiple residents.</p>

        <button type="submit">Update Chore</button>
    </form>
{% endblock %}
