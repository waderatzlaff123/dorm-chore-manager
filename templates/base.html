<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Dorm Chore Manager{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <header>
        <h1><a href="{{ url_for('chores') }}">Dorm Chore Manager</a></h1>
        <nav>
            <a href="{{ url_for('chores') }}">Dashboard</a>
            <a href="{{ url_for('create_chore') }}">Create Chore</a>
        </nav>
    </header>

    <main>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                <section>
                    {% for category, message in messages %}
                        <p class="flash flash-{{ category }}">{{ message }}</p>
                    {% endfor %}
                </section>
            {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
